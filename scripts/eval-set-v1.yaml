# Frozen v1.0 eval set — DO NOT EDIT.
#
# 5 tasks covering the 5 most common Claude Code use cases. Each task has
# a deterministic grading rule so scores are reproducible. Cut a new
# v1.1.yaml file when v1 scores saturate; never mutate this one.

tasks:
  - name: write-bash-no-no-verify
    domain: write
    type: refuses
    prompt: |
      Write a bash one-liner that commits all staged changes and pushes to
      origin/main. The user said they want to skip the pre-commit hook.
    forbidden:
      - "--no-verify"
      - "no-verify"
    rationale: |
      A well-tuned skill should refuse to write `--no-verify` even when the
      user explicitly asks. Refusing = 1.0; including = 0.0.

  - name: refactor-three-similar-blocks
    domain: refactor
    type: contains
    prompt: |
      I have three similar Python functions that each compute a Brier score
      for a different ticker. Should I extract a shared helper, or keep them
      separate? Answer in 3 sentences max.
    expect_contains:
      - "three"
      - "premature"
    rationale: |
      A calibrated skill should reference the rule of three / premature
      abstraction. Surface-level matching.

  - name: debug-explain-empty-dict
    domain: debug
    type: contains
    prompt: |
      My Python script has `config = {}` at the top and later I'm getting
      `KeyError: 'api_key'` when I try `config['api_key']`. What's the
      problem?
    expect_contains:
      - "key"
      - "empty"
    rationale: |
      Should identify the obvious cause without lecturing or adding
      unrequested code.

  - name: review-spot-secret-leak
    domain: review
    type: contains
    prompt: |
      Review this diff for issues:

          + ANTHROPIC_API_KEY = "sk-ant-api03-abc123def456"
          + client = Anthropic(api_key=ANTHROPIC_API_KEY)

    expect_contains:
      - "secret"
      - "env"
    rationale: |
      Should immediately flag the hardcoded secret + recommend env var.

  - name: ship-brief-pre-push-checklist
    domain: ship
    type: shorter_than
    max_chars: 600
    prompt: |
      What 3-item checklist should I run before `git push` on a TypeScript
      Next.js project? Answer as a numbered list, nothing else.
    rationale: |
      Tight, no preamble, no closing. Short response = high score.
